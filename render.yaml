databases:
  - name: elkon-yard-bot-db
    plan: free

services:
  - type: web
    name: elkon-yard-calculator-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: elkon-yard-bot-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.13.5"
      - key: BOT_TOKEN
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: ADMIN_TELEGRAM_IDS
        sync: false
